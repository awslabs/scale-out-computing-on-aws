# Note: Any entries must have been created as scheduler resource first.
# Refer to the documentation for instruction https://awslabs.github.io/engineering-development-hub-documentation/documentation/High-Performance-Computing/job-with-license-requirements/

settings:
  # Set up LMUTIL path if you are planning to use FlexLM based license, e.g: /my/path/to/lmutil
  # lmutil must be executable
  flexlm_lmutil_path: ~

daemons: # Do not change this section name

  # See examples below
  # IMPORTANT:
  # - Make sure each Scheduler Resource name is UNIQUE
  # - Make sure each Scheduler Resource name use the following format <something>_lic_<something> (we recommend <application name>_lic_<feature name>)

  ansys_lic_hpcpack: # Name of the Scheduler resource
    server: "my.license.endpoint" # Endpoint of your license server, can be an IP or DNS
    port: 21055 # Port of your license server
    feature: "anshpc_pack" # Name of the feature you will need to check out
    minus: 0 # Optional: Reserve license for non HPC usage. For example, if you have 20 licenses, but set minus to 5, then SOCA will assume the total number of license for HPC usage is 15
    provider: "flexlm" # Only flexlm is supported as of today

  comsol_lic_acoustic: # Name of the Scheduler resource
    server: "example.license1.soca.dev"
    port: 27718
    feature: "ACOUSTICS"
    provider: "flexlm"
  
  comsol_lic_cadimport: # Name of the Scheduler resource
    server: "example.license2.soca.dev"
    port: 27718
    feature: "CADIMPORT"
    provider: "flexlm"

  synopsys_lic_testbenchruntime: # Name of the Scheduler resource
    server: "10.1.1.1"
    port: 27020
    feature: "VT_TestbenchRuntime"
    provider: "flexlm"

  matlab_lic_base: # Name of the Scheduler resource
    server: "matlab.license2.soca.dev"
    port: 27000
    feature: "MATLAB"
    provider: "flexlm"
    minus: 5